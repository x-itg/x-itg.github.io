<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDE AI Engineering Tools</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif; }
        
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* 侧边栏动画 */
        .sidebar-item {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar-item:hover {
            background: rgba(59, 130, 246, 0.08);
        }
        .sidebar-item.active {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
        .sidebar-item.active .status-dot { background: #4ade80 !important; }
        
        /* 内容区域过渡 */
        .content-panel {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 卡片悬浮效果 */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        /* 渐变背景 */
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        /* 状态点动画 */
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .status-healthy { background: #22c55e; }
        .status-warning { background: #f59e0b; }
        .status-error { background: #ef4444; }
        
        /* 工具图标 */
        .tool-icon {
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px;
            font-size: 18px;
            transition: all 0.2s;
        }
        .sidebar-item:hover .tool-icon { transform: scale(1.1); }
    </style>
</head>

        function switchModule(moduleId) {
            // 更新侧边栏选中状态

                    item.classList.add('active');
                }
            });
            
            // 更新顶部标题

            document.getElementById('current-module-title').textContent = config.title;
            currentModule = moduleId;
            
            // 加载对应内容
            loadModuleContent(moduleId);
        }

            if (type === 'expect') color = 'text-yellow-400';
            
            const logDiv = document.createElement('div');
            logDiv.className = `${color} mb-1`;
            logDiv.textContent = `[${time}] ${message}`;
            logStream.appendChild(logDiv);
            logStream.scrollTop = logStream.scrollHeight;
        }

        function startLogDemo() {
            if (logDemoInterval) return;
            const btn = document.getElementById('log-demo-btn');
            if (btn) {
                btn.textContent = '⏸ 运行中...';
                btn.classList.remove('bg-green-500');
                btn.classList.add('bg-gray-500');
            }
            
            logDemoInterval = setInterval(() => {
                const rand = Math.random();
                if (rand < 0.6) {
                    addLog(positiveLogs[Math.floor(Math.random() * positiveLogs.length)], 'positive');
                    posCount++;
                } else if (rand < 0.85) {
                    addLog(negativeLogs[Math.floor(Math.random() * negativeLogs.length)], 'negative');
                    negCount++;
                } else {
                    addLog(expectLogs[Math.floor(Math.random() * expectLogs.length)], 'expect');
                    expectCount++;
                }
                document.getElementById('pos-count').textContent = posCount;
                document.getElementById('neg-count').textContent = negCount;
                document.getElementById('expect-count').textContent = expectCount;
            }, 1500);
        }

        function stopLogDemo() {
            if (logDemoInterval) {
                clearInterval(logDemoInterval);
                logDemoInterval = null;
            }
            const btn = document.getElementById('log-demo-btn');
            if (btn) {
                btn.textContent = '▶ 重新演示';
                btn.classList.remove('bg-gray-500');
                btn.classList.add('bg-green-500');
            }
        }

        function resetLogDemo() {
            stopLogDemo();
            posCount = 0;
            negCount = 0;
            expectCount = 0;
            document.getElementById('pos-count').textContent = '0';
            document.getElementById('neg-count').textContent = '0';
            document.getElementById('expect-count').textContent = '0';
            const logStream = document.getElementById('log-stream');
            if (logStream) {
                logStream.innerHTML = '<div class="text-gray-500">[已重置，点击"启动演示"开始...]</div>';
            }
        }

        // 收敛引擎演示功能
        let bugTasks = [];
        let testTasks = [];
        let convInterval = null;
        let iterProgress = 0;
        let taskDone = 0;
        let taskFail = 0;

        function updateTaskStats() {
            const total = bugTasks.length + testTasks.length;
            const pending = bugTasks.filter(t => t.status === 'pending').length + 
                           testTasks.filter(t => t.status === 'pending').length;
            document.getElementById('task-total').textContent = total;
            document.getElementById('task-pending').textContent = pending;
            document.getElementById('task-done').textContent = taskDone;
            document.getElementById('task-fail').textContent = taskFail;
        }

        function renderBugQueue() {
            const queue = document.getElementById('bug-queue');
            if (!queue) return;
            if (bugTasks.length === 0) {
                queue.innerHTML = '<div class="text-gray-400">暂无Bug任务</div>';
            } else {
                queue.innerHTML = bugTasks.map((t, i) => `
                    <div class="flex items-center gap-2 p-2 bg-white rounded ${t.status === 'done' ? 'opacity-50' : ''}">
                        <span class="${t.status === 'done' ? 'text-green-500' : t.status === 'fail' ? 'text-red-500' : 'text-yellow-500'}">${t.status === 'done' ? '✓' : t.status === 'fail' ? '✗' : '⏳'}</span>
                        <span class="flex-1 truncate">${t.title}</span>
                        <button onclick="removeBug(${i})" class="text-red-500 hover:text-red-700">×</button>
                    </div>
                `).join('');
            }
        }

        function renderTestQueue() {
            const queue = document.getElementById('test-queue');
            if (!queue) return;
            if (testTasks.length === 0) {
                queue.innerHTML = '<div class="text-gray-400">暂无测试任务</div>';
            } else {
                queue.innerHTML = testTasks.map((t, i) => `
                    <div class="flex items-center gap-2 p-2 bg-white rounded ${t.status === 'done' ? 'opacity-50' : ''}">
                        <span class="${t.status === 'done' ? 'text-green-500' : t.status === 'fail' ? 'text-red-500' : 'text-yellow-500'}">${t.status === 'done' ? '✓' : t.status === 'fail' ? '✗' : '⏳'}</span>
                        <span class="flex-1 truncate">${t.title}</span>
                        <button onclick="removeTest(${i})" class="text-red-500 hover:text-red-700">×</button>
                    </div>
                `).join('');
            }
        }

        function addBugTask() {
            const titles = ['I2C通信超时', '内存泄漏', '串口丢包', '看门狗失效', 'ADC采样不准'];
            bugTasks.push({ title: titles[Math.floor(Math.random() * titles.length)], status: 'pending' });
            renderBugQueue();
            updateTaskStats();
        }

        function addTestTask() {
            const titles = ['边界条件测试', '异常处理测试', '性能测试', '集成测试', '回归测试'];
            testTasks.push({ title: titles[Math.floor(Math.random() * titles.length)], status: 'pending' });
            renderTestQueue();
            updateTaskStats();
        }

        function removeBug(index) {
            bugTasks.splice(index, 1);
            renderBugQueue();
            updateTaskStats();
        }

        function removeTest(index) {
            testTasks.splice(index, 1);
            renderTestQueue();
            updateTaskStats();
        }

        function startConvergence() {
            if (convInterval) return;
            const btn = document.getElementById('conv-btn');
            if (btn) {
                btn.textContent = '⏳ 收敛中...';
                btn.classList.remove('bg-green-500');
                btn.classList.add('bg-yellow-500');
            }
            iterProgress = 0;
            taskDone = 0;
            taskFail = 0;
            
            convInterval = setInterval(() => {
                iterProgress += 5;
                document.getElementById('iter-progress').textContent = iterProgress + '%';
                document.getElementById('iter-bar').style.width = iterProgress + '%';
                
                // 随机完成任务
                const pendingBugs = bugTasks.filter(t => t.status === 'pending');
                const pendingTests = testTasks.filter(t => t.status === 'pending');
                
                if (pendingBugs.length > 0 && Math.random() > 0.5) {
                    const idx = Math.floor(Math.random() * pendingBugs.length);
                    const realIdx = bugTasks.indexOf(pendingBugs[idx]);
                    bugTasks[realIdx].status = Math.random() > 0.2 ? 'done' : 'fail';
                    if (bugTasks[realIdx].status === 'done') taskDone++; else taskFail++;
                }
                if (pendingTests.length > 0 && Math.random() > 0.5) {
                    const idx = Math.floor(Math.random() * pendingTests.length);
                    const realIdx = testTasks.indexOf(pendingTests[idx]);
                    testTasks[realIdx].status = Math.random() > 0.15 ? 'done' : 'fail';
                    if (testTasks[realIdx].status === 'done') taskDone++; else taskFail++;
                }
                
                renderBugQueue();
                renderTestQueue();
                updateTaskStats();
                
                if (iterProgress >= 100) {
                    clearInterval(convInterval);
                    convInterval = null;
                    if (btn) {
                        btn.textContent = '✅ 收敛完成';
                        btn.classList.remove('bg-yellow-500');
                        btn.classList.add('bg-green-500');
                    }
                }
            }, 500);
        }

        // 电路图导航器功能
        let currentZoom = 1;
        let selectedComponent = null;

        const componentInfo = {
            'MCU': { pins: '48', addr: '0x4002 2000', code: 'Src/main.c:12' },
            'SENSOR': { pins: '4', addr: '0x44', code: 'Src/sht40.c:8' },
            'I2C': { pins: '2', addr: '0x4000 5400', code: 'Src/i2c.c:5' },
            'LED': { pins: '2', addr: 'N/A', code: 'Src/gpio.c:25' }
        };

        function zoomIn() {
            currentZoom = Math.min(currentZoom + 0.2, 2);
            applyZoom();
        }

        function zoomOut() {
            currentZoom = Math.max(currentZoom - 0.2, 0.5);
            applyZoom();
        }

        function resetZoom() {
            currentZoom = 1;
            applyZoom();
        }

        function applyZoom() {
            const viewer = document.getElementById('schematic-viewer');
            if (viewer) {
                viewer.style.transform = `scale(${currentZoom})`;
                document.getElementById('zoom-level').textContent = Math.round(currentZoom * 100) + '%';
            }
        }

        function selectComponent(el, type) {
            // 移除之前的选中状态
            document.querySelectorAll('.circuit-component').forEach(c => {
                c.classList.remove('ring-2', 'ring-blue-500');
            });
            el.classList.add('ring-2', 'ring-blue-500');
            selectedComponent = type;
            
            const info = componentInfo[type] || {};
            document.getElementById('component-name').textContent = type;
            document.getElementById('component-pins').textContent = info.pins || '-';
            document.getElementById('component-addr').textContent = info.addr || '-';
            document.getElementById('component-code').textContent = info.code || '-';
            document.getElementById('component-detail').classList.remove('hidden');
        }

        function jumpToCode() {
            const info = componentInfo[selectedComponent];
            if (info && info.code) {
                alert(`跳转到: ${info.code}\n\n(实际会打开IDE并定位到对应代码行)`);
            }
        }

        function runOCR() {
            const result = document.getElementById('ocr-result');
            result.innerHTML = '<span class="text-yellow-600">🔄 OCR识别中...</span>';
            
            setTimeout(() => {
                const ocrData = [
                    { ref: 'U1', desc: 'STM32F103C8T6', type: 'MCU' },
                    { ref: 'U2', desc: 'SHT40', type: '温湿度传感器' },
                    { ref: 'R1', desc: '10kΩ', type: '上拉电阻' },
                    { ref: 'LED1', desc: '3mm 红色', type: '指示灯' }
                ];
                result.innerHTML = '<div class="space-y-1">' + 
                    ocrData.map(item => `<div><span class="font-bold">${item.ref}</span>: ${item.desc} (${item.type})</div>`)
                    .join('') + 
                    '</div>';
            }, 1500);
        }

        // 知识体征搜索功能
        const factIndex = [
            { keyword: 'I2C', facts: [
                { text: 'I2C1_SCL → PB6', source: 'hardware_config.md' },
                { text: 'I2C1_SDA → PB7', source: 'hardware_config.md' },
                { text: 'SHT40 I2C地址 → 0x44', source: 'sht40_driver.md' }
            ]},
            { keyword: 'SHT40', facts: [
                { text: 'SHT40 I2C地址 → 0x44', source: 'sht40_driver.md' },
                { text: '温湿度寄存器地址 → 0x0001-0x0002', source: 'modbus_spec.md' }
            ]},
            { keyword: 'Modbus', facts: [
                { text: '温湿度寄存器地址 → 0x0001-0x0002', source: 'modbus_spec.md' },
                { text: 'RS485配置 → 9600bps, 8N1', source: 'modbus_spec.md' }
            ]},
            { keyword: '看门狗', facts: [
                { text: '看门狗超时 → 3000ms', source: 'error_handling.md' }
            ]},
            { keyword: '引脚', facts: [
                { text: 'I2C1_SCL → PB6', source: 'hardware_config.md' },
                { text: 'I2C1_SDA → PB7', source: 'hardware_config.md' }
            ]}
        ];

        function searchFact() {
            const query = document.getElementById('fact-search').value.trim().toLowerCase();
            const results = document.getElementById('search-results');
            
            if (!query) {
                results.innerHTML = '<span class="text-gray-400">请输入搜索关键词...</span>';
                return;
            }
            
            const matchedFacts = [];
            factIndex.forEach(item => {
                if (item.keyword.toLowerCase().includes(query)) {
                    matchedFacts.push(...item.facts);
                }
            });
            
            if (matchedFacts.length === 0) {
                results.innerHTML = '<span class="text-gray-400">未找到匹配的事实索引...</span>';
            } else {
                results.innerHTML = '<div class="space-y-2">' + 
                    matchedFacts.map(fact => `
                        <div class="bg-blue-50 p-2 rounded">
                            <div class="font-medium">${fact.text}</div>
                            <div class="text-xs text-gray-500">来源: ${fact.source}</div>
                        </div>
                    `).join('') + 
                    '</div>';
            }
        }

        let alertMuted = false;
        function toggleAlert() {
            alertMuted = !alertMuted;
            const btn = document.getElementById('alert-toggle-btn');
            if (!btn) return;
            if (alertMuted) {
                btn.textContent = '🔕 预警已静音';
                btn.classList.remove('bg-blue-500');
                btn.classList.add('bg-gray-500');
            } else {
                btn.textContent = '🔔 3 条预警';
                btn.classList.remove('bg-gray-500');
                btn.classList.add('bg-blue-500');
            }
        }

        // Skills Launcher 功能
        let currentSkill = null;
        let skillHistory = [];

        const skillInfo = {
            'generate_docs': { icon: '📄', title: '生成文档', outputFile: 'docs/generated_doc.md' },
            'validate_spec': { icon: '✓', title: '规约验证', outputFile: 'validation_report.txt' },
            'generate_test': { icon: '🧪', title: '生成测试', outputFile: 'Tests/generated_tests.c' },
            'analyze_impact': { icon: '🔍', title: '影响分析', outputFile: 'impact_report.html' },
            'extract_api': { icon: '🔗', title: 'API提取', outputFile: 'api_spec.yaml' }
        };

        function selectSkill(skillId) {
            currentSkill = skillId;
            
            // 更新侧边栏选中状态
            document.querySelectorAll('.skill-item').forEach(item => {
                item.classList.remove('bg-blue-200', 'ring-2', 'ring-blue-400');
                if (item.dataset.skill === skillId) {
                    item.classList.add('bg-blue-200', 'ring-2', 'ring-blue-400');
                }
            });

            // 显示表单
            const placeholder = document.getElementById('skill-form-placeholder');
            const container = document.getElementById('skill-form-container');
            if (placeholder) placeholder.classList.add('hidden');
            if (container) container.classList.remove('hidden');

            // 设置表单标题
            const info = skillInfo[skillId];
            document.getElementById('skill-icon').textContent = info.icon;
            document.getElementById('skill-title').textContent = info.title;

            // 隐藏所有表单，显示当前
            document.querySelectorAll('.skill-form').forEach(form => {
                form.classList.add('hidden');
            });
            const targetForm = document.getElementById('form-' + skillId);
            if (targetForm) targetForm.classList.remove('hidden');

            // 隐藏结果区域
            document.getElementById('skill-result').classList.add('hidden');
        }

        function closeSkillForm() {
            currentSkill = null;
            document.querySelectorAll('.skill-item').forEach(item => {
                item.classList.remove('bg-blue-200', 'ring-2', 'ring-blue-400');
            });
            document.getElementById('skill-form-placeholder').classList.remove('hidden');
            document.getElementById('skill-form-container').classList.add('hidden');
            document.getElementById('skill-result').classList.add('hidden');
        }

        function updateCoverageDisplay(value) {
            document.getElementById('coverage-value').textContent = value + '%';
        }

        function executeSkill() {
            if (!currentSkill) return;

            const resultDiv = document.getElementById('skill-result');
            const resultContent = document.getElementById('result-content');
            const resultIcon = document.getElementById('result-icon');

            resultDiv.classList.remove('hidden');
            resultIcon.textContent = '⏳';
            resultContent.innerHTML = '<span class="text-yellow-600">正在执行 ' + skillInfo[currentSkill].title + '...</span>';

            // 模拟执行
            setTimeout(() => {
                const outputs = {
                    'generate_docs': [
                        '> 分析源文件: Src/i2c.c',
                        '> 提取函数签名和注释',
                        '> 生成文档结构',
                        '> 完成! 输出: docs/generated_doc.md',
                        '',
                        '# I2C驱动开发文档',
                        '## 函数列表',
                        '- i2c_init() - I2C初始化',
                        '- i2c_read_reg() - 寄存器读取',
                        '- i2c_read_with_retry() - 带重试读取'
                    ],
                    'validate_spec': [
                        '> 扫描目录: Src/',
                        '> 检查规约违反...',
                        '',
                        '⚠️ 发现 2 处违反:',
                        '  - i2c.c:45 - 缺少错误日志',
                        '  - i2c.c:78 - 超时时间过短',
                        '',
                        '✓ 规约检查完成 (2 警告)'
                    ],
                    'generate_test': [
                        '> 分析源文件: Src/sht40.c',
                        '> 生成单元测试用例...',
                        '',
                        '✓ 生成测试用例 12 个',
                        '  - test_init_success',
                        '  - test_init_timeout',
                        '  - test_read_valid',
                        '  - test_read_crc_error',
                        '  ...',
                        '> 输出: Tests/generated_tests.c'
                    ],
                    'analyze_impact': [
                        '> 分析变更: Src/i2c.c',
                        '> 追踪依赖关系...',
                        '',
                        '📊 影响分析结果:',
                        '  直接依赖:',
                        '    - Src/sht40_driver.c',
                        '    - Inc/i2c.h',
                        '  传递依赖:',
                        '    - Src/main.c',
                        '    - Inc/main.h',
                        '',
                        '⚠️ 建议运行回归测试'
                    ],
                    'extract_api': [
                        '> 扫描目录: Inc/',
                        '> 提取API定义...',
                        '',
                        '✓ 提取完成!',
                        '  - HAL_I2C_Master_Transmit',
                        '  - HAL_I2C_Master_Receive',
                        '  - HAL_GPIO_Init',
                        '  ...',
                        '> 输出: api_spec.yaml (OpenAPI 3.0)'
                    ]
                };

                resultIcon.textContent = '✅';
                resultContent.innerHTML = outputs[currentSkill].map(line => 
                    `<div>${line}</div>`
                ).join('');

                // 添加到历史记录
                addToHistory(currentSkill);

            }, 1500);
        }

        function addToHistory(skillId) {
            const info = skillInfo[skillId];
            const time = new Date().toLocaleTimeString();
            
            skillHistory.unshift({
                skill: skillId,
                title: info.title,
                time: time,
                icon: info.icon
            });

            // 只保留最近5条
            if (skillHistory.length > 5) {
                skillHistory.pop();
            }

            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('skill-history');
            if (!container) return;

            if (skillHistory.length === 0) {
                container.innerHTML = '<div class="text-sm text-gray-400 text-center py-2">暂无执行记录</div>';
                return;
            }

            container.innerHTML = skillHistory.map((item, idx) => `
                <div class="flex items-center gap-3 p-2 bg-gray-50 rounded hover:bg-gray-100">
                    <span class="text-lg">${item.icon}</span>
                    <div class="flex-1">
                        <div class="font-medium text-sm">${item.title}</div>
                        <div class="text-xs text-gray-500">${item.time}</div>
                    </div>
                    <button onclick="rerunSkill('${item.skill}')" class="text-xs text-blue-500 hover:text-blue-700">
                        重新执行
                    </button>
                </div>
            `).join('');
        }

        function rerunSkill(skillId) {
            selectSkill(skillId);
            executeSkill();
        }

        function addToConvergence() {
            if (!currentSkill) return;

            const info = skillInfo[currentSkill];
            
            // 根据skill类型添加到对应的收敛引擎队列
            if (currentSkill === 'validate_spec') {
                const target = document.getElementById('val-target')?.value || 'Src/';
                testTasks.push({ title: `规约验证: ${target}`, status: 'pending' });
                renderTestQueue();
                updateTaskStats();
            } else if (currentSkill === 'generate_test') {
                const source = document.getElementById('test-source')?.value || 'unknown.c';
                testTasks.push({ title: `生成测试: ${source}`, status: 'pending' });
                renderTestQueue();
                updateTaskStats();
            }

            // 显示提示
            const resultContent = document.getElementById('result-content');
            resultContent.innerHTML += '<div class="mt-3 p-2 bg-purple-100 rounded text-purple-700 text-sm">📤 已加入收敛引擎验证队列</div>';
        }

        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadModuleContent('law-manager');
        });
    </script>
</body>
</html>
